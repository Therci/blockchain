<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Pacientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>
  <div class="orb o6"></div>

  <main class="card">
    <h1>Cadastro de Pacientes</h1>
    <p class="subtitle">Envie dados ao contrato e visualize os pacientes cadastrados.</p>

    <div id="connectionStatus" class="status status--pending">
      Conectando à blockchain...
    </div>

    <section class="block">
      <h2>Cadastrar paciente</h2>
      <form id="formPaciente">
        <label for="inputNome">Nome:</label>
        <input id="inputNome" name="nome" type="text" placeholder="Nome completo" required />

        <label for="inputCpf">CPF:</label>
        <input id="inputCpf" name="cpf" type="text" placeholder="000.000.000-00" required />

        <label for="inputIdade">Idade:</label>
        <input id="inputIdade" name="idade" type="number" min="13" step="1" placeholder="Ex.: 30" required />

        <label for="inputEndereco">Endereço:</label>
        <input id="inputEndereco" name="endereco" type="text" placeholder="Endereço (opcional)" />

        <button type="submit" id="btnCadastrar" class="btn btn--primary">Cadastrar paciente</button>
      </form>
    </section>

    <section class="block">
      <h2>Pacientes cadastrados</h2>
      <button id="btnAtualizarPacientes" class="btn btn--secondary">Atualizar lista</button>
      <div id="listaPacientes" class="log"></div>
      <div id="detalhesPaciente" class="resultado" style="display: none;"></div>
    </section>

    <section class="block">
      <h2>Status</h2>
      <div id="log" class="log"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <script src="https://unpkg.com/splitting/dist/splitting.min.js"></script>
  <script src="contractData.js"></script>
  <script src="app.js"></script>
</body>
</html>
